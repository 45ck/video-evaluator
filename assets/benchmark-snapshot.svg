  <text x="648" y="366" fill="url(#green)" filter="url(#glow)" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">3 / 3</text>

  <text x="918" y="296" fill="#8FA3B8" font-family="Arial, Helvetica, sans-serif" font-size="22" letter-spacing="2">MEANINGFUL FLOW</text>
  <text x="918" y="366" fill="#F4F7FA" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">2 / 3</text>

  <rect x="80" y="448" width="1120" height="208" rx="22" fill="#0B141D" stroke="#234556"/>
  <text x="112" y="494" fill="#6FE7FF" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="3">WHAT THIS MEANS</text>

  <circle cx="122" cy="540" r="5" fill="#6FE7FF"/>
  <text x="146" y="548" fill="#E8EEF5" font-family="Arial, Helvetica, sans-serif" font-size="28">The repo now reports low-signal OCR explicitly instead of pretending weak text is product proof.</text>

  <circle cx="122" cy="586" r="5" fill="#6FE7FF"/>
  <text x="146" y="594" fill="#E8EEF5" font-family="Arial, Helvetica, sans-serif" font-size="28">High-fit public cases still need stronger weak-frame recovery and layout-aware app/view extraction.</text>

  <circle cx="122" cy="632" r="5" fill="#6FE7FF"/>
  <text x="146" y="640" fill="#E8EEF5" font-family="Arial, Helvetica, sans-serif" font-size="28">This is a better failure mode: grounded abstention first, richer semantics second.</text>

  <text x="80" y="690" fill="#7E93A7" font-family="Arial, Helvetica, sans-serif" font-size="20">Source: /home/calvin/tmp/video-evaluator-youtube-benchmark-gated/benchmark.report.json</text>
