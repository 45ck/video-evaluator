  <text x="80" y="92" fill="#6FE7FF" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="4">BENCHMARK SNAPSHOT</text>
  <text x="80" y="150" fill="#F4F7FA" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700">YouTube pinned benchmark</text>
  <text x="80" y="198" fill="#B4C2D0" font-family="Arial, Helvetica, sans-serif" font-size="30">Current honest result: the pipeline runs end to end, but semantic understanding is still weak on public software videos.</text>

